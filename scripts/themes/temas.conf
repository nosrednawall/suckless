# temas.conf - Configuração de temas no formato INI-like
# Cada tema é definido em um bloco [Nome do Tema]

# ============================================
# Temas Solarized
# ============================================

[Solarized Dark]
theme_gtk = NumixSolarizedDarkCyan
theme_icon = Numix-Circle
theme_mode = Solarized
color_mode = Dark
gtk_prefer_dark = 1
emacs_theme = doom-solarized-dark
wallpaper = LbI3B9z.jpeg

# Cores base
background = #002B36
background2 = #073642
text = #839496

# Cores principais (1-8)
color1 = #b58900    # Amarelo
color2 = #cb4b16    # Laranja
color3 = #dc322f    # Vermelho
color4 = #d33682    # Magenta
color5 = #6c71c4    # Violeta
color6 = #268bd2    # Azul
color7 = #859900    # Verde
color8 = #2aa198    # Ciano

# Cores secundárias (9-16)
color9 = #f0c674    # Amarelo claro
color10 = #ff9d5c   # Laranja claro
color11 = #ff6b55   # Vermelho claro
color12 = #ff7cb8   # Magenta claro
color13 = #9a9ee8   # Violeta claro
color14 = #62b3e2   # Azul claro
color15 = #a3d572   # Verde claro
color16 = #69d9cf   # Ciano claro

[Solarized Light]
theme_gtk = NumixSolarizedLightCyan
theme_icon = Numix-Circle-Light
theme_mode = Solarized
color_mode = Light
gtk_prefer_dark = 0
emacs_theme = doom-solarized-light
wallpaper = burst-light.png

background = #eee8d5
background2 = #eee8d5
text = #657b83

color1 = #b58900    # Amarelo
color2 = #cb4b16    # Laranja
color3 = #dc322f    # Vermelho
color4 = #d33682    # Magenta
color5 = #6c71c4    # Violeta
color6 = #268bd2    # Azul
color7 = #859900    # Verde
color8 = #2aa198    # Ciano

color9 = #9a7b00    # Amarelo escuro
color10 = #a83c0f   # Laranja escuro
color11 = #b8221f   # Vermelho escuro
color12 = #a92b68   # Magenta escuro
color13 = #555ab7   # Violeta escuro
color14 = #1a73b8   # Azul escuro
color15 = #6a7d00   # Verde escuro
color16 = #1f8881   # Ciano escuro

